# mako/config — generado por matugen (overwrite completo).
# Geometría/tipografía/timeouts preservados; solo cambian colores.
sort=-time
layer=overlay
background-color={{colors.surface_container.default.hex}}ee
text-color={{colors.on_surface.default.hex}}
border-color={{colors.primary.default.hex}}
border-size=2
border-radius=10
width=380
height=140
margin=12
padding=14,18
font=JetBrainsMono Nerd Font 11
icon-path=/usr/share/icons/Papirus-Dark
max-icon-size=48
default-timeout=6000
ignore-timeout=0
anchor=top-right
outer-margin=8
group-by=app-name

[urgency=low]
border-color={{colors.tertiary.default.hex}}
default-timeout=4000

[urgency=normal]
border-color={{colors.primary.default.hex}}

[urgency=critical]
border-color={{colors.error.default.hex}}
background-color={{colors.surface.default.hex}}ff
default-timeout=0
