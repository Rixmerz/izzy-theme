# ─────────────────────────────────────────────────────────────────────────────
#  Hyprland — HP OMEN 15 (Ryzen 7 4800H + RTX 2060) — kb_layout latam
# ─────────────────────────────────────────────────────────────────────────────

################
### MONITORS ###
################
monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################
$terminal    = kitty
$fileManager = thunar
$menu        = wofi --show drun
$browser     = firefox

#############################
### ENVIRONMENT VARIABLES ###
#############################
# NVIDIA (driver propietario / nvidia-open)
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = GBM_BACKEND,nvidia-drm
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,0
env = MOZ_DISABLE_RDD_SANDBOX,1
env = EGL_PLATFORM,wayland

# Wayland / toolkits
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = _JAVA_AWT_WM_NONREPARENTING,1

# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

#################
### AUTOSTART ###
#################
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent.service || /usr/lib/hyprpolkitagent
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in            = 5
    gaps_out           = 12
    border_size        = 2
    col.active_border  = rgba(89b4faee) rgba(b4befeee) 45deg
    col.inactive_border = rgba(45475aaa)
    resize_on_border   = true
    allow_tearing      = false
    layout             = dwindle
}

decoration {
    rounding         = 10
    # Los siguientes valores (opacity, blur.*, shadow.color y los col.* del bloque general)
    # los sobreescribe el tema activo, ver `source = …/hyprland-colors.conf` al final.
    active_opacity   = 0.90
    inactive_opacity = 0.82

    shadow {
        enabled      = true
        range        = 14
        render_power = 3
        color        = rgba(00000099)
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        new_optimizations = true
        ignore_opacity    = true
        vibrancy          = 0.20
    }
}

# Tema activo (colores + overrides de blur/opacity) — generado por matugen.
# Cambiar tema: `theme <ruta-imagen>`
source = ~/.config/theme/outputs/hyprland-colors.conf

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 8,  default
    animation = border,        1, 5,  easeOutQuint
    animation = windows,       1, 5,  easeOutQuint
    animation = windowsIn,     1, 5,  easeOutQuint, popin 90%
    animation = windowsOut,    1, 4,  easeOutQuint, popin 90%
    animation = fadeIn,        1, 3,  quick
    animation = fadeOut,       1, 3,  quick
    animation = workspaces,    1, 4,  easeOutQuint, slide
}

dwindle {
    pseudotile      = true
    preserve_split  = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    vfr                     = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    enable_swallow          = true
    swallow_regex           = ^(kitty|Alacritty|foot)$
}

#############
### INPUT ###
#############
input {
    kb_layout    = latam
    kb_variant   =
    kb_model     =
    # kb_options vacío: preserva AltGr (Right-Alt) para @, #, [, ], {, }, ~, \, |, €…
    kb_options   =
    kb_rules     =

    follow_mouse = 1
    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        drag_lock            = true
        scroll_factor        = 0.4
        clickfinger_behavior = true
    }
}

# Touchpad gesture: 3-dedos horizontal -> cambiar workspace
# (En Hyprland 0.50+ `workspace_swipe` y `workspace_swipe_fingers` se removieron;
#  el resto de opciones del bloque `gestures {}` sigue siendo válido.)
gesture = 3, horizontal, workspace

gestures {
    workspace_swipe_distance           = 300
    workspace_swipe_invert             = true
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_cancel_ratio       = 0.5
    workspace_swipe_create_new         = true
    workspace_swipe_forever            = true
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# Apps
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       B,      exec, $browser
bind = $mainMod,       R,      exec, $menu

# Window mgmt
bind = $mainMod SHIFT, Q,      killactive,
bind = $mainMod,       F,      fullscreen, 0
bind = $mainMod SHIFT, F,      fullscreen, 1
bind = $mainMod,       V,      togglefloating,
bind = $mainMod,       P,      pseudo,
bind = $mainMod SHIFT, M,      exit,
bind = $mainMod SHIFT, L,      exec, hyprlock

# Focus (vim hjkl + arrows)
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h,     movefocus, l
bind = $mainMod, j,     movefocus, d
bind = $mainMod, k,     movefocus, u
bind = $mainMod, l,     movefocus, r

# Move/swap windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, h,     movewindow, l
bind = $mainMod SHIFT, j,     movewindow, d
bind = $mainMod SHIFT, k,     movewindow, u
bind = $mainMod SHIFT, l,     movewindow, r

# Resize
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive,  40 0
binde = $mainMod CTRL, up,    resizeactive, 0 -40
binde = $mainMod CTRL, down,  resizeactive, 0  40

# Workspaces 1..9
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,         special:magic

# Scroll workspaces with mouse wheel
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# Screenshots (grim + slurp + wl-clipboard)
bind = ,           Print, exec, grim - | wl-copy -t image/png
bind = SHIFT,      Print, exec, grim -g "$(slurp)" - | wl-copy -t image/png
bind = $mainMod,   Print, exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%F_%H-%M-%S).png
bind = $mainMod SHIFT, Print, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%F_%H-%M-%S).png

# Clipboard history (cliphist + wofi/fuzzel)
bind = $mainMod, semicolon, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ---- Multimedia ----
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioPrev,  exec, playerctl previous
bindl  = , XF86AudioStop,  exec, playerctl stop

##############################
### WINDOWS AND WORKSPACES ###
##############################
# ─── Window rules (sintaxis Hyprland 0.50+: `match:` para props, `field value` para efectos) ───
# Floating dialogs / pickers
windowrule = match:class ^(pavucontrol)$, float true
windowrule = match:class ^(blueman-manager)$, float true
windowrule = match:class ^(nm-connection-editor)$, float true
windowrule = match:class ^(thunar)$, match:title ^(File Operation Progress)$, float true
windowrule = match:title ^(Open File)$, float true
windowrule = match:title ^(Save File)$, float true
windowrule = match:title ^(Save As)$, float true
windowrule = match:title ^(Choose Files)$, float true
windowrule = match:title ^(Confirm.*)$, float true
windowrule = match:title ^(Library)$, float true
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float true
windowrule = match:class ^(xdg-desktop-portal-hyprland)$, float true

# Polkit prompts: float + center + tamaño fijo
windowrule = match:class ^(polkit-.*)$, float true, center true, size 600 400
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float true, center true

# Picture-in-Picture: float + pin
windowrule = match:title ^(Picture-in-Picture)$, float true, pin true

# Suppress maximize spam (todas las apps)
windowrule = match:class .*, suppress_event maximize

# Idle inhibit cuando hay fullscreen de video
windowrule = match:class ^(firefox|chromium|mpv|vlc)$, idle_inhibit fullscreen
