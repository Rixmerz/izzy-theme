# hyprpaper — wallpaper persistente
# Apunta al symlink que mantiene `bin/theme`; así el último wallpaper
# aplicado persiste entre reinicios.  install.sh garantiza que el symlink
# exista apuntando a /usr/share/hypr/wall0.png si no hay tema aplicado.
preload  = $HOME/.config/theme/current-wallpaper
wallpaper = ,$HOME/.config/theme/current-wallpaper
splash   = false
ipc      = on
