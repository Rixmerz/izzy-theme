# hyprlock — consume colores del tema activo.
# Los $c_* se definen en el archivo generado por matugen:
source = ~/.config/theme/outputs/hyprlock-colors.conf

general {
    grace                       = 2
    hide_cursor                 = true
    no_fade_in                  = false
    disable_loading_bar         = true
    immediate_render            = true
}

background {
    monitor   =
    # Symlink mantenido por el script `theme`; apunta al wallpaper activo.
    path      = ~/.config/theme/current-wallpaper
    blur_passes = 3
    blur_size   = 6
    contrast    = 0.9
    brightness  = 0.7
    vibrancy    = 0.16
    vibrancy_darkness = 0.05
}

# Reloj grande
label {
    monitor      =
    text         = cmd[update:1000] echo "$(date +"%H:%M")"
    color        = $c_on_surface
    font_size    = 110
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 220
    halign       = center
    valign       = center
}

# Fecha
label {
    monitor      =
    text         = cmd[update:60000] echo "$(date +"%A, %d de %B")"
    color        = $c_on_surface_dim
    font_size    = 22
    font_family  = JetBrainsMono Nerd Font
    position     = 0, 130
    halign       = center
    valign       = center
}

# Usuario
label {
    monitor      =
    text         = $USER
    color        = $c_primary
    font_size    = 16
    font_family  = JetBrainsMono Nerd Font
    position     = 0, -60
    halign       = center
    valign       = center
}

# Input field
input-field {
    monitor           =
    size              = 320, 50
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.3
    dots_center       = true
    outer_color       = $c_primary
    inner_color       = $c_surface
    font_color        = $c_on_surface
    fade_on_empty     = true
    placeholder_text  = <i>contraseña…</i>
    hide_input        = false
    check_color       = $c_success
    fail_color        = $c_error
    fail_text         = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color    = $c_caps
    position          = 0, -120
    halign            = center
    valign            = center
}
