# hyprland-colors.conf — generado por matugen.
# Sourced desde ~/.config/hypr/hyprland.conf al final; sobreescribe los valores de color/opacity
# del archivo principal manteniendo el resto intacto.

general {
    col.active_border   = rgba(ffb3b3ee) rgba(ffb95cee) 45deg
    col.inactive_border = rgba(584141aa)
}

decoration {
    active_opacity   = 0.90
    inactive_opacity = 0.82

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        vibrancy          = 0.20
        new_optimizations = true
        ignore_opacity    = true
    }

    shadow {
        enabled      = true
        range        = 14
        render_power = 3
        color        = rgba(000000aa)
    }
}
